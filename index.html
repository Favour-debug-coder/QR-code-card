<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="/qr-code-component-main/images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    
body {
      background-color: #d5e1ef;
    }

    .qr-code {
      width: 90%;
      max-width: 300px;
      margin: 50px auto;
      padding: 20px;
      background-color: white;
      border-radius: 15px;
      text-align: center;
    }

    .qr-code img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
    }

    .description {
      font-size: 14px;
      color:gray;
      line-height: 1.4;
    }

    .attribution {
      margin-top: 30px;
      font-size: 12px;
      color: gray;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="qr-code">
    <img src="/qr-code-component-main/images/image-qr-code.png" alt="QR-code">
    <h1 class="title">Improve your front-end skills by building projects</h1>
    <p class="description">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Favour</a>.
  </div>
</body>
</html>
